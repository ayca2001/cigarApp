<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Sigara Takip">
<title>Sigara Takip</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f5f0;--card:#fff;--border:#e0e0d8;--text:#1a1a1a;--muted:#888;
  --accent:#e74c3c;--accent2:#ff6b6b;--green:#27ae60;--amber:#f39c12;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
@media(prefers-color-scheme:dark){
  :root{--bg:#1a1a1a;--card:#242424;--border:#333;--text:#f0f0f0;--muted:#999;--shadow:0 2px 12px rgba(0,0,0,0.3)}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;padding:0 0 80px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;padding:12px 0 10px;background:none;border:none;cursor:pointer;font-size:11px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .2s}
.tab-btn.active{color:var(--accent)}
.tab-icon{font-size:22px;line-height:1}
.page{display:none;padding:20px 16px}
.page.active{display:block}
.header{text-align:center;padding:28px 0 8px}
.header h1{font-size:17px;font-weight:600;letter-spacing:.2px}
.date-label{font-size:13px;color:var(--muted);margin-top:4px}
.smoke-btn-wrap{display:flex;justify-content:center;padding:20px 0 12px}
.smoke-btn{width:160px;height:160px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;box-shadow:0 8px 32px rgba(231,76,60,.35);transition:transform .1s,box-shadow .1s;color:#fff;-webkit-user-select:none;user-select:none}
.smoke-btn:active{transform:scale(.94);box-shadow:0 4px 16px rgba(231,76,60,.3)}
.smoke-btn .btn-icon{font-size:44px;line-height:1}
.smoke-btn .btn-text{font-size:13px;font-weight:600;letter-spacing:.5px;margin-top:6px;opacity:.9}
.smoke-btn .btn-count{font-size:42px;font-weight:700;line-height:1.1}
.stats-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:4px 0 16px}
.stat-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:14px 10px;text-align:center}
.stat-val{font-size:22px;font-weight:700;line-height:1}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:3px}
.lung-wrap{display:flex;justify-content:center;margin:8px 0 4px}
.section-title{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin:20px 0 10px}
.log-list{display:flex;flex-direction:column;gap:8px}
.log-item{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between}
.log-time{font-size:15px;font-weight:500}
.log-num{font-size:13px;color:var(--muted)}
.log-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:20px;padding:0 0 0 12px;line-height:1}
.log-del:active{color:var(--accent)}
.empty{text-align:center;color:var(--muted);font-size:15px;padding:40px 0}
.hist-day{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.hist-date{font-size:13px;font-weight:600}
.hist-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
.hist-count{font-size:24px;font-weight:700}
.hist-diff{font-size:13px;font-weight:500;padding:3px 10px;border-radius:20px}
.diff-good{background:#e8f8ef;color:#1e8449}
.diff-bad{background:#fdecea;color:#c0392b}
.diff-same{background:#f4f4f4;color:var(--muted)}
@media(prefers-color-scheme:dark){
  .diff-good{background:#1a3d28;color:#5dbd7a}
  .diff-bad{background:#3d1a1a;color:#e07070}
  .diff-same{background:#2a2a2a}
}
.progress-bar-bg{background:var(--bg);border-radius:4px;height:6px;margin-top:8px;overflow:hidden}
.progress-bar-fill{height:6px;border-radius:4px;background:var(--accent);transition:width .4s}
.settings-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:16px}
.setting-row{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-lbl{font-size:15px}
.setting-sub{font-size:12px;color:var(--muted);margin-top:2px}
input[type=text]{background:var(--bg);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:15px;color:var(--text);width:100%;margin-top:8px;outline:none}
input[type=text]:focus{border-color:var(--accent)}
.save-btn{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
.save-btn:active{opacity:.85}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:24px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(prefers-color-scheme:dark){.toast{background:#f0f0f0;color:#1a1a1a}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
.pulse{animation:pulse .3s ease}
</style>
</head>
<body>
<div class="app">

<div class="page active" id="page-home">
  <div class="header">
    <h1>Bugün</h1>
    <div class="date-label" id="today-label"></div>
  </div>
  <div class="smoke-btn-wrap">
    <button class="smoke-btn" id="main-btn" onclick="addSmoke()">
      <div class="btn-icon">🚬</div>
      <div class="btn-count" id="today-count">0</div>
      <div class="btn-text">İÇTİM</div>
    </button>
  </div>
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="stat-total">0</div>
      <div class="stat-lbl">Toplam</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-hour">—</div>
      <div class="stat-lbl">Son sigara</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-avg">—</div>
      <div class="stat-lbl">Günlük ort.</div>
    </div>
  </div>
  <div class="lung-wrap">
    <canvas id="lung-canvas" width="280" height="200"></canvas>
  </div>
  <div class="section-title">Bugünkü kayıtlar</div>
  <div class="log-list" id="today-log"></div>
</div>

<div class="page" id="page-history">
  <div class="header"><h1>Geçmiş</h1></div>
  <div id="history-list"></div>
</div>

<div class="page" id="page-settings">
  <div class="header"><h1>Ayarlar</h1></div>
  <div class="settings-card">
    <div class="setting-row">
      <div>
        <div class="setting-lbl">Uyarı sesi</div>
        <div class="setting-sub">Butona basınca söylenecek</div>
        <input type="text" id="voice-msg" placeholder="İçme!" value="İçme!">
      </div>
    </div>
    <div class="setting-row">
      <div style="width:100%">
        <div class="setting-lbl">Ses çıkışı</div>
        <div class="setting-sub">Tarayıcı sesi (Web Speech API)</div>
        <div style="display:flex;gap:10px;margin-top:10px">
          <button class="save-btn" style="background:#555" onclick="testVoice()">Dene</button>
        </div>
      </div>
    </div>
  </div>
  <div class="settings-card">
    <div class="setting-row">
      <div>
        <div class="setting-lbl">Gece yarısı sıfırlama</div>
        <div class="setting-sub">Günlük sayaç her gece 00:00'da sıfırlanır</div>
      </div>
      <div style="color:#27ae60;font-size:13px;font-weight:600">AKTİF</div>
    </div>
  </div>
  <button class="save-btn" onclick="saveSettings()">Kaydet</button>
  <div class="section-title" style="margin-top:28px">Tehlikeli bölge</div>
  <div class="settings-card">
    <div class="setting-row" onclick="clearAll()" style="cursor:pointer">
      <div>
        <div class="setting-lbl" style="color:#e74c3c">Tüm verileri sil</div>
        <div class="setting-sub">Bu işlem geri alınamaz</div>
      </div>
      <div style="color:var(--muted)">›</div>
    </div>
  </div>
</div>

</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showPage('home',this)">
    <span class="tab-icon">🏠</span>Ana sayfa
  </button>
  <button class="tab-btn" onclick="showPage('history',this)">
    <span class="tab-icon">📊</span>Geçmiş
  </button>
  <button class="tab-btn" onclick="showPage('settings',this)">
    <span class="tab-icon">⚙️</span>Ayarlar
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY_DAILY='sc_daily',KEY_ALL='sc_all',KEY_TOTAL='sc_total',KEY_SETTINGS='sc_settings';
function getData(){try{return JSON.parse(localStorage.getItem(KEY_DAILY)||'null')}catch{return null}}
function getAllHistory(){try{return JSON.parse(localStorage.getItem(KEY_ALL)||'[]')}catch{return[]}}
function getTotal(){return parseInt(localStorage.getItem(KEY_TOTAL)||'0')}
function getSettings(){try{return JSON.parse(localStorage.getItem(KEY_SETTINGS)||'{"msg":"İçme!"}')}catch{return{msg:'İçme!'}}}
function todayKey(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function checkReset(){
  let d=getData();const tk=todayKey();
  if(!d||d.date!==tk){
    if(d&&d.date&&d.logs&&d.logs.length>0){
      let hist=getAllHistory();
      hist.unshift({date:d.date,count:d.logs.length,logs:d.logs});
      if(hist.length>90)hist=hist.slice(0,90);
      localStorage.setItem(KEY_ALL,JSON.stringify(hist));
    }
    d={date:tk,logs:[]};
    localStorage.setItem(KEY_DAILY,JSON.stringify(d));
  }
  return d;
}
function saveDaily(d){localStorage.setItem(KEY_DAILY,JSON.stringify(d))}
function addSmoke(){
  const d=checkReset();
  const now=new Date();
  const ts=now.getTime();
  const label=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0');
  d.logs.push({ts,label});
  saveDaily(d);
  localStorage.setItem(KEY_TOTAL,(getTotal()+1).toString());
  speakMsg();pulse();render();showToast('Kaydedildi — '+label);
}
function deleteLog(idx){
  const d=checkReset();
  d.logs.splice(idx,1);
  saveDaily(d);
  localStorage.setItem(KEY_TOTAL,Math.max(0,getTotal()-1).toString());
  render();showToast('Kayıt silindi');
}
function speakMsg(){
  const s=getSettings();
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(s.msg||'İçme!');
  u.lang='tr-TR';u.rate=1;u.pitch=1;u.volume=1;
  window.speechSynthesis.speak(u);
}
function testVoice(){
  const msg=document.getElementById('voice-msg').value||'İçme!';
  if(!window.speechSynthesis){showToast('Tarayıcı sesi desteklenmiyor');return}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(msg);
  u.lang='tr-TR';window.speechSynthesis.speak(u);
}
function saveSettings(){
  localStorage.setItem(KEY_SETTINGS,JSON.stringify({msg:document.getElementById('voice-msg').value}));
  showToast('Kaydedildi!');
}
function clearAll(){
  if(!confirm('Tüm veriler silinsin mi? Bu işlem geri alınamaz.'))return;
  localStorage.removeItem(KEY_DAILY);localStorage.removeItem(KEY_ALL);localStorage.removeItem(KEY_TOTAL);
  render();showToast('Tüm veriler silindi');
}
function pulse(){
  const btn=document.getElementById('main-btn');
  btn.classList.remove('pulse');void btn.offsetWidth;btn.classList.add('pulse');
}
function showPage(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='history')renderHistory();
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._timer);t._timer=setTimeout(()=>t.classList.remove('show'),2200);
}
function drawLung(count){
  const canvas=document.getElementById('lung-canvas');
  const ctx=canvas.getContext('2d');
  const W=280,H=200;
  ctx.clearRect(0,0,W,H);
  const maxSmoke=30,ratio=Math.min(count/maxSmoke,1);
  const isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  const r=Math.round(40+ratio*180),g=Math.round(180-ratio*150),b=Math.round(80-ratio*50);
  const lungColor=`rgb(${r},${g},${b})`;
  ctx.save();
  ctx.beginPath();ctx.moveTo(125,40);
  ctx.bezierCurveTo(80,40,55,70,55,110);
  ctx.bezierCurveTo(55,155,75,175,105,175);
  ctx.bezierCurveTo(115,178,120,170,125,155);
  ctx.closePath();
  ctx.fillStyle=lungColor;ctx.fill();
  ctx.strokeStyle=isDark?'rgba(255,255,255,.15)':'rgba(0,0,0,.12)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  ctx.save();
  ctx.beginPath();ctx.moveTo(155,40);
  ctx.bezierCurveTo(200,40,225,70,225,110);
  ctx.bezierCurveTo(225,155,205,175,175,175);
  ctx.bezierCurveTo(165,178,160,170,155,155);
  ctx.closePath();
  ctx.fillStyle=lungColor;ctx.fill();
  ctx.strokeStyle=isDark?'rgba(255,255,255,.15)':'rgba(0,0,0,.12)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  if(count>0){
    const spots=Math.min(Math.floor(count/2)+1,15);
    const rng=(seed)=>{let x=Math.sin(seed)*10000;return x-Math.floor(x)};
    ctx.globalAlpha=Math.min(0.15+ratio*0.5,0.65);
    for(let i=0;i<spots;i++){
      const side=i%2;
      const cx=side===0?(75+rng(i*7)*40):(165+rng(i*7)*40);
      const cy=80+rng(i*13)*80,r2=5+rng(i*17)*8;
      ctx.beginPath();ctx.arc(cx,cy,r2,0,Math.PI*2);
      ctx.fillStyle=isDark?'#1a0a0a':'#3d1a0a';ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.save();
  ctx.beginPath();ctx.moveTo(140,20);ctx.lineTo(140,50);
  ctx.moveTo(140,50);ctx.bezierCurveTo(125,55,115,60,110,68);
  ctx.moveTo(140,50);ctx.bezierCurveTo(155,55,165,60,170,68);
  ctx.strokeStyle=isDark?'rgba(255,255,255,.3)':'rgba(0,0,0,.2)';
  ctx.lineWidth=3;ctx.lineCap='round';ctx.stroke();ctx.restore();
  const faceX=140,faceY=16,faceR=13;
  ctx.save();
  ctx.beginPath();ctx.arc(faceX,faceY,faceR,0,Math.PI*2);
  const happy=ratio<0.3,medium=ratio<0.65;
  ctx.fillStyle=happy?'#f1c40f':medium?'#e67e22':'#e74c3c';ctx.fill();
  ctx.strokeStyle=isDark?'rgba(255,255,255,.2)':'rgba(0,0,0,.15)';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle=isDark?'rgba(0,0,0,.7)':'rgba(0,0,0,.75)';
  if(!happy&&!medium){
    ctx.lineWidth=1.5;ctx.strokeStyle=isDark?'rgba(0,0,0,.7)':'rgba(0,0,0,.75)';
    for(const ex of [faceX-4,faceX+4]){
      ctx.beginPath();ctx.moveTo(ex-2,faceY-4);ctx.lineTo(ex+2,faceY-2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(ex+2,faceY-4);ctx.lineTo(ex-2,faceY-2);ctx.stroke();
    }
  }else{
    ctx.beginPath();ctx.arc(faceX-4,faceY-2,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(faceX+4,faceY-2,1.5,0,Math.PI*2);ctx.fill();
  }
  ctx.strokeStyle='rgba(0,0,0,.7)';ctx.lineWidth=1.8;ctx.lineCap='round';
  ctx.beginPath();
  if(happy){ctx.arc(faceX,faceY+1,5,0.2,Math.PI-0.2);}
  else if(medium){ctx.moveTo(faceX-5,faceY+5);ctx.lineTo(faceX+5,faceY+5);}
  else{ctx.arc(faceX,faceY+8,5,Math.PI+0.2,-0.2);}
  ctx.stroke();ctx.restore();
}
function render(){
  const d=checkReset();const count=d.logs.length;const total=getTotal();const hist=getAllHistory();
  const now=new Date();
  const days=['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
  document.getElementById('today-label').textContent=days[now.getDay()]+', '+now.getDate()+' '+['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'][now.getMonth()];
  document.getElementById('today-count').textContent=count;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-hour').textContent=count>0?d.logs[d.logs.length-1].label:'—';
  document.getElementById('stat-avg').textContent=hist.length>0?Math.round(hist.slice(0,7).reduce((s,h)=>s+h.count,0)/Math.min(hist.length,7)):'—';
  const logEl=document.getElementById('today-log');
  logEl.innerHTML=count===0?'<div class="empty">Bugün henüz sigara içmedin 🎉</div>':
    d.logs.map((l,i)=>`<div class="log-item"><div><div class="log-time">${l.label}</div><div class="log-num">#${i+1} sigara</div></div><button class="log-del" onclick="deleteLog(${i})">×</button></div>`).reverse().join('');
  drawLung(count);
  document.getElementById('voice-msg').value=getSettings().msg||'İçme!';
}
function renderHistory(){
  const hist=getAllHistory();const el=document.getElementById('history-list');
  if(hist.length===0){el.innerHTML='<div class="empty">Henüz geçmiş kaydı yok</div>';return}
  const maxCount=Math.max(...hist.map(h=>h.count),1);
  const months=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  el.innerHTML=hist.map((h,i)=>{
    const prev=hist[i+1],diff=prev?h.count-prev.count:null;
    let diffHtml='';
    if(diff!==null){
      if(diff<0)diffHtml=`<span class="hist-diff diff-good">${diff} daha az</span>`;
      else if(diff>0)diffHtml=`<span class="hist-diff diff-bad">+${diff} daha fazla</span>`;
      else diffHtml=`<span class="hist-diff diff-same">Aynı</span>`;
    }
    const [y,m,d2]=h.date.split('-');
    return`<div class="hist-day"><div class="hist-date">${parseInt(d2)} ${months[parseInt(m)-1]} ${y}</div><div class="hist-meta"><div class="hist-count">${h.count} sigara</div>${diffHtml}</div><div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${Math.round((h.count/maxCount)*100)}%"></div></div></div>`;
  }).join('');
}
setInterval(()=>{const d=getData();if(d&&d.date!==todayKey()){render();}},60000);
render();
</script>
</body>
</html>
