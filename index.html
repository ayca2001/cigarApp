<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily Tracker">
<title>Daily Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f2f2f2;--card:#fff;--border:#ddd;--text:#111;--muted:#888;--accent:#222;--subtle:#e8e8e8}
@media(prefers-color-scheme:dark){:root{--bg:#111;--card:#1c1c1c;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--accent:#eee;--subtle:#252525}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{max-width:430px;margin:0 auto;padding:0 0 80px}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:0.5px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.tab-btn{flex:1;padding:12px 0 10px;background:none;border:none;cursor:pointer;font-size:10px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .2s}
.tab-btn.active{color:var(--text)}
.tab-icon{font-size:20px;line-height:1}
.page{display:none;padding:16px}
.page.active{display:block}
.header{text-align:center;padding:20px 0 4px}
.header h1{font-size:17px;font-weight:600}
.date-label{font-size:13px;color:var(--muted);margin-top:3px}
.day-score-wrap{display:flex;justify-content:center;margin-top:7px}
.day-score-btn{background:none;border:0.5px solid var(--border);cursor:pointer;font-size:12px;color:var(--muted);font-weight:500;padding:4px 14px;border-radius:20px}
.day-score-btn.rated{color:var(--text);border-color:var(--accent)}
.tracker-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:14px 0}
.tracker-card{background:var(--card);border:0.5px solid var(--border);border-radius:18px;padding:16px 14px;display:flex;flex-direction:column;gap:12px}
.tracker-card.full{grid-column:1/-1}
.card-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
.card-count{font-size:36px;font-weight:700;line-height:1}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.add-btn{width:44px;height:44px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;color:var(--bg);font-size:26px;display:flex;align-items:center;justify-content:center;transition:transform .1s,opacity .1s;flex-shrink:0}
.add-btn:active{transform:scale(.9);opacity:.75}
.del-btn{background:none;border:none;cursor:pointer;color:var(--border);font-size:24px;line-height:1;padding:4px}
.del-btn:active{color:var(--text)}
.sport-btns{display:flex;flex-direction:column;gap:7px}
.sport-opt{width:100%;padding:10px 14px;border:0.5px solid var(--border);border-radius:12px;background:none;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;text-align:left}
.sport-opt.active{border-color:var(--text);background:var(--subtle);color:var(--text)}
.sport-opt:active{transform:scale(.98)}
.lung-wrap{display:flex;justify-content:center;margin:4px 0 0}
.section-title{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;margin:18px 0 8px}
.log-list{display:flex;flex-direction:column;gap:7px}
.log-item{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between}
.log-time{font-size:14px;font-weight:500}
.log-num{font-size:12px;color:var(--muted)}
.log-del{background:none;border:none;cursor:pointer;color:var(--border);font-size:20px;padding:0 0 0 12px;line-height:1}
.log-del:active{color:var(--text)}
.empty{text-align:center;color:var(--muted);font-size:14px;padding:30px 0}
.hist-day{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.hist-date{font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:space-between}
.hist-score{font-size:12px;color:var(--muted);font-weight:600}
.hist-row{display:flex;gap:16px;margin-top:8px;flex-wrap:wrap;align-items:center}
.hist-stat{display:flex;flex-direction:column}
.hist-stat-val{font-size:18px;font-weight:700}
.hist-stat-lbl{font-size:11px;color:var(--muted)}
.hist-diff{font-size:12px;font-weight:500;padding:2px 9px;border-radius:20px;background:var(--subtle);color:var(--muted)}
.sport-tag{font-size:11px;padding:2px 9px;border-radius:10px;background:var(--subtle);color:var(--muted);font-weight:500}
.settings-card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:14px}
.setting-row{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-lbl{font-size:15px}
.setting-sub{font-size:12px;color:var(--muted);margin-top:2px}
input[type=text]{background:var(--subtle);border:0.5px solid var(--border);border-radius:8px;padding:8px 12px;font-size:15px;color:var(--text);width:100%;margin-top:8px;outline:none}
.save-btn{width:100%;padding:13px;background:var(--accent);color:var(--bg);border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
.save-btn:active{opacity:.8}
.toggle{position:relative;width:44px;height:26px;flex-shrink:0}
.toggle input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:#ccc;border-radius:26px;cursor:pointer;transition:.3s}
.toggle-slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
.toggle input:checked + .toggle-slider{background:var(--accent)}
.toggle input:checked + .toggle-slider:before{transform:translateX(18px)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border-radius:24px 24px 0 0;padding:24px 20px 40px;width:100%;max-width:430px}
.modal h2{font-size:17px;font-weight:600;text-align:center;margin-bottom:4px}
.modal-sub{font-size:13px;color:var(--muted);text-align:center;margin-bottom:20px}
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.score-opt{padding:12px 0;border:0.5px solid var(--border);border-radius:12px;background:none;font-size:18px;font-weight:700;cursor:pointer;color:var(--text);transition:all .15s}
.score-opt:active{transform:scale(.94)}
.score-opt.selected{background:var(--accent);border-color:var(--accent);color:var(--bg)}
.modal-cancel{width:100%;padding:13px;background:none;border:0.5px solid var(--border);border-radius:14px;font-size:15px;color:var(--muted);cursor:pointer;margin-top:4px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--accent);color:var(--bg);padding:10px 20px;border-radius:24px;font-size:14px;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
.pop{animation:pop .25s ease}
</style>
</head>
<body>
<div class="app">

<div class="page active" id="page-home">
  <div class="header">
    <h1>Daily Tracker</h1>
    <div class="date-label" id="today-label"></div>
    <div class="day-score-wrap">
      <button class="day-score-btn" id="score-btn" onclick="openScoreModal()">?/10</button>
    </div>
  </div>

  <div class="tracker-grid">
    <div class="tracker-card">
      <div class="card-title">🚬 Cigarettes</div>
      <div>
        <div class="card-count" id="today-smoke">0</div>
        <div class="card-sub">today</div>
      </div>
      <div class="card-footer">
        <button class="del-btn" id="smoke-del-btn" onclick="deleteLastSmoke()">×</button>
        <button class="add-btn" id="smoke-add-btn" onclick="addSmoke()">+</button>
      </div>
    </div>

    <div class="tracker-card">
      <div class="card-title">☕ Coffee</div>
      <div>
        <div class="card-count" id="today-coffee">0</div>
        <div class="card-sub">today</div>
      </div>
      <div class="card-footer">
        <button class="del-btn" id="coffee-del-btn" onclick="deleteLastCoffee()">×</button>
        <button class="add-btn" onclick="addCoffee()">+</button>
      </div>
    </div>

    <div class="tracker-card full">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="card-title">💪 Workout</div>
        <span id="sport-done-tag" style="display:none" class="sport-tag">✓ Done</span>
      </div>
      <div class="sport-btns">
        <button class="sport-opt" id="sport-leg" onclick="setSport('Leg Day')">🦵 Leg Day</button>
        <button class="sport-opt" id="sport-upper" onclick="setSport('Upper Body')">💪 Upper Body</button>
        <button class="sport-opt" id="sport-cardio" onclick="setSport('Cardio')">🏃 Cardio</button>
        <button class="sport-opt" id="sport-rest" onclick="setSport('Rest Day')">😴 Rest Day</button>
      </div>
    </div>
  </div>

  <div class="lung-wrap">
    <canvas id="lung-canvas" width="260" height="185"></canvas>
  </div>

  <div class="section-title">Cigarette log</div>
  <div class="log-list" id="today-log"></div>

  <div class="section-title">Coffee log</div>
  <div class="log-list" id="today-coffee-log"></div>
</div>

<div class="page" id="page-history">
  <div class="header"><h1>History</h1></div>
  <div id="history-list"></div>
</div>

<div class="page" id="page-settings">
  <div class="header"><h1>Settings</h1></div>
  <div class="settings-card">
    <div class="setting-row">
      <div style="flex:1">
        <div class="setting-lbl">Alert message</div>
        <div class="setting-sub">Spoken when you log a cigarette</div>
        <input type="text" id="voice-msg" value="Don't smoke!">
      </div>
    </div>
    <div class="setting-row">
      <div>
        <div class="setting-lbl">Sound enabled</div>
        <div class="setting-sub">Play voice alert on log</div>
      </div>
      <label class="toggle">
        <input type="checkbox" id="sound-toggle" checked>
        <span class="toggle-slider"></span>
      </label>
    </div>
    <div class="setting-row">
      <div class="setting-lbl">Test voice</div>
      <button class="save-btn" style="width:auto;padding:8px 18px;margin-top:0;font-size:13px" onclick="testVoice()">Play</button>
    </div>
  </div>
  <button class="save-btn" onclick="saveSettings()">Save</button>
  <div class="section-title" style="margin-top:24px">Danger zone</div>
  <div class="settings-card">
    <div class="setting-row" onclick="clearAll()" style="cursor:pointer">
      <div>
        <div class="setting-lbl">Delete all data</div>
        <div class="setting-sub">This cannot be undone</div>
      </div>
      <div style="color:var(--muted)">›</div>
    </div>
  </div>
</div>

</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showPage('home',this)">
    <span class="tab-icon">🏠</span>Home
  </button>
  <button class="tab-btn" onclick="showPage('history',this)">
    <span class="tab-icon">📊</span>History
  </button>
  <button class="tab-btn" onclick="showPage('settings',this)">
    <span class="tab-icon">⚙️</span>Settings
  </button>
</div>

<div class="modal-overlay hidden" id="score-modal">
  <div class="modal">
    <h2>Rate your day</h2>
    <div class="modal-sub" id="score-modal-sub">How was today?</div>
    <div class="score-grid" id="score-grid"></div>
    <button class="modal-cancel" onclick="closeScoreModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var KD='sc_daily', KA='sc_all', KT='sc_total', KS='sc_settings';

function getData(){
  try{ return JSON.parse(localStorage.getItem(KD)||'null'); }catch(e){ return null; }
}
function getAllHistory(){
  try{ return JSON.parse(localStorage.getItem(KA)||'[]'); }catch(e){ return []; }
}
function getTotal(){
  return parseInt(localStorage.getItem(KT)||'0');
}
function getSettings(){
  try{ return JSON.parse(localStorage.getItem(KS)||'{"msg":"Don\'t smoke!","sound":true}'); }
  catch(e){ return {msg:"Don't smoke!",sound:true}; }
}
function todayKey(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function checkReset(){
  var d=getData(), tk=todayKey();
  if(!d||d.date!==tk){
    if(d&&d.date&&((d.smokeLogs&&d.smokeLogs.length>0)||(d.coffeeLogs&&d.coffeeLogs.length>0)||d.sport||d.score)){
      var hist=getAllHistory();
      hist.unshift({date:d.date,smoke:d.smokeLogs?d.smokeLogs.length:0,coffee:d.coffeeLogs?d.coffeeLogs.length:0,sport:d.sport||null,score:d.score||null});
      if(hist.length>90) hist=hist.slice(0,90);
      localStorage.setItem(KA,JSON.stringify(hist));
    }
    d={date:tk,smokeLogs:[],coffeeLogs:[],sport:null,score:null};
    localStorage.setItem(KD,JSON.stringify(d));
  }
  return d;
}
function saveDaily(d){
  localStorage.setItem(KD,JSON.stringify(d));
}
function nowLabel(){
  var n=new Date();
  return n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
}
function addSmoke(){
  var d=checkReset(), label=nowLabel();
  d.smokeLogs.push({ts:Date.now(),label:label});
  saveDaily(d);
  localStorage.setItem(KT,(getTotal()+1).toString());
  speakMsg();
  var b=document.getElementById('smoke-add-btn');
  b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop');
  render();
  showToast('🚬 Logged — '+label);
}
function addCoffee(){
  var d=checkReset(), label=nowLabel();
  d.coffeeLogs.push({ts:Date.now(),label:label});
  saveDaily(d);
  render();
  showToast('☕ Coffee logged — '+label);
}
function deleteLastSmoke(){
  var d=checkReset();
  if(!d.smokeLogs.length) return;
  d.smokeLogs.pop();
  saveDaily(d);
  localStorage.setItem(KT,Math.max(0,getTotal()-1).toString());
  render();
  showToast('Cigarette entry removed');
}
function deleteLastCoffee(){
  var d=checkReset();
  if(!d.coffeeLogs.length) return;
  d.coffeeLogs.pop();
  saveDaily(d);
  render();
  showToast('Coffee entry removed');
}
function deleteSmoke(idx){
  var d=checkReset();
  d.smokeLogs.splice(idx,1);
  saveDaily(d);
  localStorage.setItem(KT,Math.max(0,getTotal()-1).toString());
  render();
  showToast('Entry deleted');
}
function deleteCoffee(idx){
  var d=checkReset();
  d.coffeeLogs.splice(idx,1);
  saveDaily(d);
  render();
  showToast('Coffee entry removed');
}
function setSport(type){
  var d=checkReset();
  d.sport=(d.sport===type)?null:type;
  saveDaily(d); render();
  if(d.sport) showToast('💪 '+type+' logged');
}
function speakMsg(){
  var s=getSettings();
  if(!s.sound||!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(s.msg||"Don't smoke!");
  u.lang='en-US'; u.rate=1; u.volume=1;
  window.speechSynthesis.speak(u);
}
function testVoice(){
  var msg=document.getElementById('voice-msg').value||"Don't smoke!";
  if(!window.speechSynthesis){ showToast('Speech not supported'); return; }
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(msg);
  u.lang='en-US';
  window.speechSynthesis.speak(u);
}
function saveSettings(){
  var msg=document.getElementById('voice-msg').value;
  var sound=document.getElementById('sound-toggle').checked;
  localStorage.setItem(KS,JSON.stringify({msg:msg,sound:sound}));
  showToast('Saved!');
}
function clearAll(){
  if(!confirm('Delete all data? This cannot be undone.')) return;
  [KD,KA,KT].forEach(function(k){ localStorage.removeItem(k); });
  render();
  showToast('All data deleted');
}
function openScoreModal(){
  var d=checkReset();
  document.getElementById('score-modal-sub').textContent=d.score?('Current: '+d.score+'/10 — change it'):'How was today?';
  var grid=document.getElementById('score-grid');
  grid.innerHTML='';
  for(var i=1;i<=10;i++){
    (function(n){
      var btn=document.createElement('button');
      btn.className='score-opt'+(d.score===n?' selected':'');
      btn.textContent=n;
      btn.onclick=function(){ setScore(n); };
      grid.appendChild(btn);
    })(i);
  }
  document.getElementById('score-modal').classList.remove('hidden');
}
function closeScoreModal(){
  document.getElementById('score-modal').classList.add('hidden');
}
function setScore(n){
  var d=checkReset();
  d.score=n; saveDaily(d);
  closeScoreModal(); render();
  showToast('⭐ Day rated '+n+'/10');
}
function showPage(name,el){
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('page-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='history') renderHistory();
  if(name==='settings'){
    var s=getSettings();
    document.getElementById('voice-msg').value=s.msg||"Don't smoke!";
    document.getElementById('sound-toggle').checked=s.sound!==false;
  }
}
function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(function(){ t.classList.remove('show'); },2200);
}
function drawLung(count){
  var canvas=document.getElementById('lung-canvas');
  var ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,260,185);
  var t=Math.min(count/6,1);
  var r=Math.round(40+t*200);
  var g=Math.round(160-t*130);
  var b=Math.round(60-t*50);
  var lc='rgb('+r+','+g+','+b+')';
  var isDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
  var stroke=isDark?'rgba(255,255,255,.1)':'rgba(0,0,0,.08)';
  function drawLobe(flip){
    ctx.save(); ctx.beginPath();
    if(!flip){
      ctx.moveTo(115,36); ctx.bezierCurveTo(72,36,48,64,48,102);
      ctx.bezierCurveTo(48,144,67,162,96,162);
      ctx.bezierCurveTo(106,165,111,157,115,143);
    } else {
      ctx.moveTo(145,36); ctx.bezierCurveTo(188,36,212,64,212,102);
      ctx.bezierCurveTo(212,144,193,162,164,162);
      ctx.bezierCurveTo(154,165,149,157,145,143);
    }
    ctx.closePath();
    ctx.fillStyle=lc; ctx.fill();
    ctx.strokeStyle=stroke; ctx.lineWidth=1.5; ctx.stroke();
    ctx.restore();
  }
  drawLobe(false); drawLobe(true);
  if(count>0){
    var ratio=Math.min(count/30,1);
    var spots=Math.min(Math.floor(count/2)+1,14);
    function rng(s){ var x=Math.sin(s)*10000; return x-Math.floor(x); }
    ctx.globalAlpha=Math.min(0.12+ratio*0.45,0.55);
    for(var i=0;i<spots;i++){
      var side=i%2;
      var cx=side===0?(65+rng(i*7)*36):(152+rng(i*7)*36);
      var cy=72+rng(i*13)*76, rr=5+rng(i*17)*7;
      ctx.beginPath(); ctx.arc(cx,cy,rr,0,Math.PI*2);
      ctx.fillStyle=isDark?'#000':'#2a1a00'; ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.save();
  ctx.beginPath(); ctx.moveTo(130,18); ctx.lineTo(130,44);
  ctx.moveTo(130,44); ctx.bezierCurveTo(116,49,107,55,102,63);
  ctx.moveTo(130,44); ctx.bezierCurveTo(144,49,153,55,158,63);
  ctx.strokeStyle=isDark?'rgba(255,255,255,.22)':'rgba(0,0,0,.15)';
  ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.stroke(); ctx.restore();
  var ratio2=Math.min(count/30,1);
  var happy=ratio2<0.3, med=ratio2<0.65;
  var fx=130,fy=14,fr=12;
  ctx.save(); ctx.beginPath(); ctx.arc(fx,fy,fr,0,Math.PI*2);
  var fg=isDark?(happy?180:med?140:100):(happy?220:med?180:130);
  ctx.fillStyle='rgb('+fg+','+fg+','+fg+')'; ctx.fill();
  ctx.strokeStyle=stroke; ctx.lineWidth=1; ctx.stroke();
  var ec='rgba(0,0,0,.7)';
  ctx.fillStyle=ec;
  if(!happy&&!med){
    ctx.lineWidth=1.5; ctx.strokeStyle=ec;
    [fx-4,fx+4].forEach(function(ex){
      ctx.beginPath(); ctx.moveTo(ex-2,fy-4); ctx.lineTo(ex+2,fy-2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ex+2,fy-4); ctx.lineTo(ex-2,fy-2); ctx.stroke();
    });
  } else {
    ctx.beginPath(); ctx.arc(fx-4,fy-2,1.5,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(fx+4,fy-2,1.5,0,Math.PI*2); ctx.fill();
  }
  ctx.strokeStyle=ec; ctx.lineWidth=1.8; ctx.lineCap='round';
  ctx.beginPath();
  if(happy) ctx.arc(fx,fy+1,5,0.2,Math.PI-0.2);
  else if(med){ ctx.moveTo(fx-5,fy+5); ctx.lineTo(fx+5,fy+5); }
  else ctx.arc(fx,fy+8,5,Math.PI+0.2,-0.2);
  ctx.stroke(); ctx.restore();
}
function render(){
  var d=checkReset();
  var smoke=d.smokeLogs.length, coffee=d.coffeeLogs.length;
  var now=new Date();
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('today-label').textContent=days[now.getDay()]+', '+now.getDate()+' '+months[now.getMonth()];
  document.getElementById('today-smoke').textContent=smoke;
  document.getElementById('today-coffee').textContent=coffee;
  var scoreBtn=document.getElementById('score-btn');
  scoreBtn.textContent=d.score?(d.score+'/10'):'?/10';
  scoreBtn.className='day-score-btn'+(d.score?' rated':'');
  document.getElementById('smoke-del-btn').style.visibility=smoke>0?'visible':'hidden';
  document.getElementById('coffee-del-btn').style.visibility=coffee>0?'visible':'hidden';
  var sportMap={'Leg Day':'leg','Upper Body':'upper','Cardio':'cardio','Rest Day':'rest'};
  ['leg','upper','cardio','rest'].forEach(function(k){ document.getElementById('sport-'+k).className='sport-opt'; });
  if(d.sport&&sportMap[d.sport]) document.getElementById('sport-'+sportMap[d.sport]).className='sport-opt active';
  document.getElementById('sport-done-tag').style.display=d.sport?'':'none';
  var logEl=document.getElementById('today-log');
  if(smoke===0){
    logEl.innerHTML='<div class="empty">No cigarettes today 🎉</div>';
  } else {
    logEl.innerHTML=d.smokeLogs.map(function(l,i){
      return '<div class="log-item"><div><div class="log-time">'+l.label+'</div><div class="log-num">#'+(i+1)+'</div></div><button class="log-del" onclick="deleteSmoke('+i+')">×</button></div>';
    }).reverse().join('');
  }
  var coffeeLogEl=document.getElementById('today-coffee-log');
  if(coffee===0){
    coffeeLogEl.innerHTML='<div class="empty">No coffees today</div>';
  } else {
    coffeeLogEl.innerHTML=d.coffeeLogs.map(function(l,i){
      return '<div class="log-item"><div><div class="log-time">'+l.label+'</div><div class="log-num">#'+(i+1)+'</div></div><button class="log-del" onclick="deleteCoffee('+i+')">×</button></div>';
    }).reverse().join('');
  }
  drawLung(smoke);
}
function renderHistory(){
  var hist=getAllHistory();
  var el=document.getElementById('history-list');
  if(hist.length===0){ el.innerHTML='<div class="empty">No history yet</div>'; return; }
  var months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  el.innerHTML=hist.map(function(h,i){
    var prev=hist[i+1];
    var diff=prev!=null?h.smoke-prev.smoke:null;
    var diffHtml='';
    if(diff!==null){
      if(diff<0) diffHtml='<span class="hist-diff">'+diff+' less</span>';
      else if(diff>0) diffHtml='<span class="hist-diff">+'+diff+' more</span>';
      else diffHtml='<span class="hist-diff">same</span>';
    }
    var parts=h.date.split('-');
    var scoreStr=h.score?('<span class="hist-score">'+h.score+'/10</span>'):'';
    var sportStr=h.sport?('<span class="sport-tag">'+h.sport+'</span>'):'';
    return '<div class="hist-day">'
      +'<div class="hist-date"><span>'+parseInt(parts[2])+' '+months[parseInt(parts[1])-1]+' '+parts[0]+'</span>'+scoreStr+'</div>'
      +'<div class="hist-row">'
      +'<div class="hist-stat"><div class="hist-stat-val">🚬 '+h.smoke+'</div><div class="hist-stat-lbl">cigarettes</div></div>'
      +'<div class="hist-stat"><div class="hist-stat-val">☕ '+(h.coffee||0)+'</div><div class="hist-stat-lbl">coffees</div></div>'
      +(h.sport?('<div class="hist-stat">'+sportStr+'</div>'):'')
      +diffHtml
      +'</div></div>';
  }).join('');
}
setInterval(function(){ var d=getData(); if(d&&d.date!==todayKey()) render(); },60000);
render();
</script>
